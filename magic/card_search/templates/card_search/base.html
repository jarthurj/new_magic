<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Card Search{% endblock %}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-stone-500 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-emerald-900 text-white p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">MAGIC</h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-amber-500">Home</a>
                <a href="/login" class="hover:text-amber-500">Login</a>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-6xl mx-auto p-6">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
