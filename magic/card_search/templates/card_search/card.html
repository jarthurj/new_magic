{% extends "./base.html" %}

{% block title %}
{% endblock %}

{% block content %}

<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">


        <div class="bg-white rounded-xl shadow-md hover:scale-125 transition">
            {% if card.image_uri != None %}
                <a href="{% url 'card' card.id%}"><img src="{{ card.image_uri }}" class="rounded-lg"></a>
            {% else %}
                <div class="p-3">
                    <p>{{ card.name.name }}</p>
                    <p>-</p>
                    <p>Image for this card is currently broken</p>
                </div>
            {% endif %}
        </div>
        <div class="">
        </div>
</div>

{% endblock %}
